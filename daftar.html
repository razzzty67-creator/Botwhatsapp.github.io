<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GFC | Pendaftaran Komunitas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Segoe UI, sans-serif;
background:#05070d;
color:#e0e0ff;
min-height:100vh;
overflow-x:hidden;
}

/* background bintang */

body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 80s linear infinite;
opacity:.25;
z-index:-1;
}

@keyframes stars{
from{transform:translate(0,0)}
to{transform:translate(-600px,-600px)}
}

/* header */

.header{
background:linear-gradient(180deg,#0f1020,#05070d);
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(0,255,255,.3);
}

.logo-text{
font-size:1.1rem;
font-weight:bold;
color:#00eaff;
letter-spacing:2px;
}

.login-btn{
background:transparent;
border:1px solid #00eaff;
color:#00eaff;
padding:8px 18px;
border-radius:25px;
cursor:pointer;
}

/* container */

.main-container{
padding:20px;
max-width:500px;
margin:auto;
animation:fadeUp 1s;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* title */

.title-section{
text-align:center;
margin:40px 0 50px;
}

.logo-big{
font-size:120px;
font-weight:bold;
background:linear-gradient(90deg,#00eaff,#7c3aed);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #00eaff)}
to{filter:drop-shadow(0 0 20px #00eaff)}
}

.main-title{
font-size:2.6rem;
font-weight:900;
color:#00eaff;
letter-spacing:3px;
margin-bottom:8px;
}

.subtitle{
font-size:1rem;
color:#9ca3ff;
letter-spacing:1.5px;
text-transform:uppercase;
}

/* form */

.form-card{
background:rgba(20,20,40,.7);
border:1px solid rgba(0,255,255,.25);
border-radius:16px;
padding:30px 24px;
backdrop-filter:blur(10px);
box-shadow:0 8px 32px rgba(0,0,0,.5);
}

.form-title{
color:#00eaff;
font-size:1.3rem;
margin-bottom:25px;
border-bottom:1px solid rgba(0,255,255,.3);
padding-bottom:12px;
}

.form-group{
margin-bottom:24px;
}

label{
display:block;
margin-bottom:8px;
color:#d1d5ff;
font-size:.9rem;
}

input, textarea{
width:100%;
padding:14px 16px;
background:rgba(40,40,70,.6);
border:1px solid rgba(0,255,255,.4);
border-radius:10px;
color:white;
font-size:1rem;
}

textarea{
min-height:110px;
resize:vertical;
}

.note{
font-size:.8rem;
color:#b0b0ff;
margin-top:6px;
}

.submit-btn{
width:100%;
padding:14px;
margin-top:10px;
background:#00eaff;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
transform:scale(1.03);
box-shadow:0 0 15px #00eaff;
}

</style>
</head>

<body>

<div class="header">
<div class="logo-text">GFC // REGISTRASI</div>
<button class="login-btn">LOGIN</button>
</div>

<div class="main-container">

<div class="title-section">
<div class="logo-big">GFC</div>
<div class="main-title">GFC REGISTRASI</div>
<div class="subtitle">
GRAFIK FLOW COMMUNITY
</div>
</div>

<div class="form-card">

<div class="form-title">IDENTIFIKASI MEMBER</div>

<div class="form-group">
<label>NAMA LENGKAP</label>
<input type="text" id="nama" placeholder="Nama asli..." required>
<div class="note">Min. 3 huruf.</div>
</div>

<div class="form-group">
<label>LINK PROFIL TIKTOK</label>
<input type="url" id="tiktok" placeholder="tiktok.com/@username">
</div>

<div class="form-group">
<label>ALASAN BERGABUNG</label>
<textarea id="alasan" placeholder="Tulis alasan singkat..."></textarea>
</div>

<button class="submit-btn" onclick="daftar()">KIRIM PENDAFTARAN</button>

</div>

</div>

<script>

function daftar(){

let nama = document.getElementById("nama").value;
let tiktok = document.getElementById("tiktok").value;
let alasan = document.getElementById("alasan").value;

if(nama.length < 3){
alert("Nama minimal 3 huruf.");
return;
}

if(tiktok === "" || alasan === ""){
alert("Harap isi semua data.");
return;
}

alert("Pendaftaran berhasil! Kamu akan masuk ke grup GFC.");

window.location.href="https://chat.whatsapp.com/E8MAfR23QTe57ItkHFEVKb?mode=gi_t";

}

</script>

</body>
</html>
