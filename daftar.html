<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Akun</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.container{
    background:white;
    padding:30px;
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;

    animation: fadeUp 0.8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#007bff;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.03);
}

.result{
    margin-top:10px;
    font-weight:bold;
}

.error{
    color:red;
}

.success{
    color:green;
}
</style>
</head>

<body>

<div class="container">
<h2>Daftar</h2>

<input type="text" placeholder="Nama" id="nama">
<input type="number" placeholder="Umur" id="umur">

<button onclick="cekUmur()">Daftar</button>

<div class="result" id="hasil"></div>

</div>

<script>

function cekUmur(){

let umur = document.getElementById("umur").value;
let hasil = document.getElementById("hasil");

if(umur < 13){

hasil.innerHTML = "❌ Umur harus 13+ untuk masuk.";
hasil.className = "result error";

}else{

let kategori = "";

if(umur <= 17){
kategori = "Remaja";
}
else if(umur <= 30){
kategori = "Dewasa Muda";
}
else{
kategori = "Dewasa";
}

hasil.innerHTML = "✅ Pendaftaran diterima<br>Kategori umur: " + kategori;
hasil.className = "result success";

}

}

</script>

</body>
</html>
