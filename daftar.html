<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    overflow:hidden;
}

/* Bintang */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:transparent url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:moveStars 60s linear infinite;
    opacity:0.6;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:10000px 5000px;}
}

/* Form */
.form-box{
    position:relative;
    z-index:2;
    background:rgba(0,0,0,0.8);
    padding:30px;
    border-radius:10px;
    width:300px;
    color:white;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.form-box h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#00ffcc;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc99;
}

</style>
</head>

<body>

<div class="form-box">
<h2>Pendaftaran</h2>

<form onsubmit="daftar(event)">
<input type="text" placeholder="Nama" required>
<input type="text" placeholder="Asal Kota" required>
<input type="text" placeholder="Nama TikTok" required>

<button type="submit">Daftar</button>
</form>

</div>

<script>

function daftar(e){
e.preventDefault()

alert("Pendaftaran berhasil! Kamu akan diarahkan ke grup.")

window.location.href="https://chat.whatsapp.com/E8MAfR23QTe57ItkHFEVKb?mode=gi_t"
}

</script>

</body>
</html>
