<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTAL GFC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
color:white;
background:linear-gradient(270deg,#000,#0b0b0b,#111);
background-size:600% 600%;
animation:bgmove 15s infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* INTRO */

#intro{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
animation:fadeIn 1.5s;
}

.logo{
width:220px;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

.banner{
width:280px;
margin-top:10px;
border-radius:10px;
}

@keyframes glow{
from{filter:drop-shadow(0 0 5px #ff00ff)}
to{filter:drop-shadow(0 0 20px #ff00ff)}
}

button{
margin-top:25px;
padding:12px 30px;
border:none;
border-radius:6px;
background:#ff00ff;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 15px #ff00ff;
}

/* PORTAL */

#portal{
display:none;
padding:30px;
animation:fadeIn 1s;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.clock{
font-size:22px;
color:#ff00ff;
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:.3s;
cursor:pointer;
text-decoration:none;
color:white;
}

.card:hover{
transform:scale(1.07);
background:#1a1a1a;
box-shadow:0 0 15px #ff00ff50;
}

.card h3{
color:#ff00ff;
margin:0;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

</style>
</head>

<body>

<div id="intro">

<img src="logo1.png" class="logo">

<h1>GRAFIK FLOW COMMUNITY</h1>
<p>Selamat datang di portal resmi komunitas GFC</p>

<img src="logo2.png" class="banner">

<button onclick="masuk()">MASUK KE PORTAL</button>

</div>


<div id="portal">

<div class="header">
<h2>PORTAL GFC</h2>
<div class="clock" id="clock"></div>
</div>

<div class="grid">

<div class="card">
<h3>Informasi Portal</h3>
<p>Dokumentasi sistem GFC</p>
</div>

<a class="card" href="https://chat.whatsapp.com/E8MAfR23QTe57ItkHFEVKb?mode=gi_t">
<h3>GFC GEN 1 👑</h3>
<p>Gabung ke grup generasi pertama</p>
</a>

<div class="card">
<h3>GFC GEN 2 🛠️</h3>
<p>Coming Soon</p>
</div>

<a class="card" href="https://whatsapp.com/channel/0029Vb7EA5PFcow09JspfL3P">
<h3>Saluran GFC 🪐</h3>
<p>Ikuti channel resmi komunitas</p>
</a>

</div>

</div>

<script>

function masuk(){
document.getElementById("intro").style.display="none"
document.getElementById("portal").style.display="block"
}

function updateClock(){
let now = new Date()
let h = String(now.getHours()).padStart(2,"0")
let m = String(now.getMinutes()).padStart(2,"0")
let s = String(now.getSeconds()).padStart(2,"0")
document.getElementById("clock").innerHTML = `${h}:${m}:${s}`
}

setInterval(updateClock,1000)

</script>

</body>
</html>
