<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home House - Fitur Utama Cakra</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0d5c3f,#1a8c6a);
color:#fff;
margin:0;
min-height:100vh;
background-image:url('https://thumbs.dreamstime.com/b/luxurious-green-background-featuring-elegant-golden-crescent-moon-ramadan-decoration-ai-generated-luxurious-green-background-370299470.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;
}

.header{
background:rgba(13,92,63,0.85);
backdrop-filter:blur(8px);
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #d4af37;
position:sticky;
top:0;
}

.header h1{
font-family:'Amiri',serif;
margin:0;
font-size:2.2em;
color:#d4af37;
}

.menu-icon{
font-size:2em;
cursor:pointer;
color:#ffd700;
}

.menu{
display:none;
position:absolute;
top:70px;
right:20px;
background:rgba(13,92,63,0.95);
border:2px solid #d4af37;
border-radius:12px;
padding:15px;
}

.menu a{
display:block;
color:white;
text-decoration:none;
padding:10px 20px;
}

.main{
text-align:center;
padding:40px 20px;
}

.section{
background:rgba(0,0,0,0.4);
border:2px solid #d4af37;
border-radius:20px;
padding:25px;
max-width:550px;
margin:25px auto;
}

.iftar-time{
font-size:4em;
font-weight:bold;
color:#ffd700;
}

.counter{
font-size:5em;
font-weight:bold;
color:#ffd700;
margin:15px 0;
}

button{
background:linear-gradient(#d4af37,#b8972e);
color:#0d5c3f;
border:none;
padding:14px 30px;
font-size:1.2em;
border-radius:50px;
cursor:pointer;
margin:10px;
}

.reset{
background:linear-gradient(#c62828,#b71c1c);
color:white;
}

footer{
position:fixed;
bottom:10px;
width:100%;
text-align:center;
color:#ccc;
font-size:0.9em;
}
</style>
</head>

<body>

<div class="header">
<h1>Home House</h1>
<div class="menu-icon" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
<a href="#">Fitur Utama</a>
<a href="#" onclick="alert('Fitur profil coming soon')">Profil</a>
<a href="#" onclick="alert('Settings masih dikembangkan')">Settings</a>
</div>

<div class="main">

<div class="section">
<h2>Data Pribadi</h2>
<p><b>Pembuat:</b> Cakra</p>
<p><b>Umur:</b> 13</p>
<p><b>Kelas:</b> 2 SMP</p>
</div>

<div class="section">
<h2>Jam Buka Puasa Hari Ini</h2>
<div class="iftar-time">18:14 WIB</div>

<input type="text" id="city" placeholder="Jakarta, Bandung..." oninput="updateCity()">
<p id="cityDisplay">Kota saat ini: Jakarta</p>
</div>

<div class="section">
<h2>Penghitung Dzikir</h2>

<div class="counter" id="counter">0</div>

<button onclick="increment()">+ Dzikir</button>
<button class="reset" onclick="resetCounter()">Reset</button>

</div>

<p style="margin-top:30px;color:#ffd700">
Ramadan Mubarak 🌙
</p>

</div>

<footer>Dibuat khusus buat Cakra</footer>

<script>

let count=0

function toggleMenu(){
const menu=document.getElementById("menu")
menu.style.display=menu.style.display==="block"?"none":"block"
}

function increment(){
count++
document.getElementById("counter").innerText=count
}

function resetCounter(){
count=0
document.getElementById("counter").innerText=count
}

function updateCity(){
let city=document.getElementById("city").value.trim()
if(city!==""){
document.getElementById("cityDisplay").innerText="Kota saat ini: "+city
}
}

</script>

</body>
</html>
