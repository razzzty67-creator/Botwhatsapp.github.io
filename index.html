<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTAL GFC</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins, sans-serif;
background:#050505;
color:white;
overflow:hidden;
}

/* INTRO SCREEN */
#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:30px;
z-index:999;
animation:fadeIn 1s;
}

#intro h1{
color:#00ffe1;
letter-spacing:2px;
}

#intro button{
margin-top:20px;
padding:12px 25px;
background:#00ffe1;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

#loading{
display:none;
margin-top:20px;
font-size:14px;
color:#00ffe1;
}

/* VIDEO INTRO */

#videoIntro{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:998;
justify-content:center;
align-items:center;
}

#videoIntro video{
width:100%;
height:100%;
object-fit:cover;
}

/* MAIN PORTAL */

#portal{
display:none;
padding:30px;
animation:fadeIn 1s;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.clock{
font-size:24px;
color:#00ffe1;
}

.grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
text-decoration:none;
color:white;
display:block;
}

.card:hover{
background:#1c1c1c;
transform:scale(1.05);
}

.card h3{
margin:0;
color:#00ffe1;
}

/* animations */

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

<h1>MARGA GFC | GRAFIK FLOW COMMUNITY</h1>

<p>Halo, Calon Member GFC</p>
<p>Ini Adalah Website GFC</p>

<button onclick="enterPortal()">SAYA PAHAM & SIAP MASUK</button>

<div id="loading">MEMBUKA SISTEM...</div>

</div>


<!-- VIDEO INTRO -->
<div id="videoIntro">

<video id="introVideo" autoplay>
<source src="https://files.catbox.moe/oz6e2n.mp4" type="video/mp4">
</video>

</div>


<!-- PORTAL -->
<div id="portal">

<div class="header">
<h2>PORTAL GFC</h2>
<div class="clock" id="clock"></div>
</div>

<div class="grid">

<div class="card">
<h3>Informasi Portal</h3>
<p>Dokumentasi lengkap sistem.</p>
</div>

<a class="card" href="https://chat.whatsapp.com/E8MAfR23QTe57ItkHFEVKb?mode=gi_t" target="_blank">
<h3>GFC GEN 1 ✨</h3>
<p>Pendaftaran anggota baru.</p>
</a>

<div class="card">
<h3>GFC GEN 2 🛠️</h3>
<p>Gen 2 Coming Soon</p>
</div>

<a class="card" href="https://whatsapp.com/channel/0029Vb7EA5PFcow09JspfL3P" target="_blank">
<h3>Saluran GFC 🪐</h3>
<p>Ikuti saluran Grafik Flow Community</p>
</a>

</div>

</div>


<script>

function enterPortal(){

document.querySelector("button").style.display="none"
document.getElementById("loading").style.display="block"

setTimeout(()=>{

document.getElementById("intro").style.display="none"
document.getElementById("videoIntro").style.display="flex"

let vid = document.getElementById("introVideo")

vid.onended = function(){
document.getElementById("videoIntro").style.display="none"
document.getElementById("portal").style.display="block"
document.body.style.overflow="auto"
}

},1500)

}

function updateClock(){
let now = new Date()
let h = String(now.getHours()).padStart(2,"0")
let m = String(now.getMinutes()).padStart(2,"0")
let s = String(now.getSeconds()).padStart(2,"0")

document.getElementById("clock").innerHTML = `${h}:${m}:${s}`
}

setInterval(updateClock,1000)

</script>

</body>
</html>
