<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOT WHATSAPP ALYA MD BY CAKRA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#fff;
color:#ff4da6;
overflow:hidden;
}

/* intro */

#protocol-screen{
position:fixed;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#fff;
z-index:10;
}

.protocol-box{
background:#ffe6f2;
padding:35px;
border-radius:12px;
text-align:center;
max-width:480px;
box-shadow:0 0 25px rgba(255,77,166,.3);
}

.checkbox{
width:22px;
height:22px;
border:2px solid #ff4da6;
display:inline-flex;
align-items:center;
justify-content:center;
margin-right:8px;
cursor:pointer;
}

.checkbox.active{
background:#ff4da6;
color:white;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff4da6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* loader */

#loader{
position:fixed;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
background:#fff;
}

video{
border-radius:12px;
box-shadow:0 0 20px rgba(255,77,166,.3);
}

.loader-text{
margin-top:15px;
font-family:Orbitron;
color:#ff4da6;
letter-spacing:2px;
}

/* main */

.wrap{
display:none;
padding:25px;
height:100vh;
overflow:auto;
}

header{
text-align:center;
margin-bottom:30px;
}

h1{
font-family:Orbitron;
color:#ff4da6;
}

.clock{
font-size:30px;
color:#ff4da6;
}

/* cards */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#ffe6f2;
padding:15px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px rgba(255,77,166,.4);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="protocol-screen">
<div class="protocol-box">
<h2>INI ADALAH WEBSITE BOT ALYA MD</h2>

<div style="display:flex;justify-content:center;margin-top:20px;" onclick="toggleCheck()">
<div id="check" class="checkbox">✓</div>
<span>Saya paham & siap masuk</span>
</div>

<button id="enterBtn" onclick="enterPortal()">TUNGGU PERSETUJUAN</button>
</div>
</div>

<!-- VIDEO INTRO -->
<div id="loader">

<video id="introVideo" width="320" controls autoplay muted>
  <source src="video6190614742030097778.mp4" type="video/mp4">
</video>

<div class="loader-text">MEMBUKA SISTEM...</div>

</div>

<div class="wrap" id="main">

<header>
<h1>BOT ALYA MD</h1>
<div id="clock" class="clock">00:00:00</div>
</header>

<div class="grid">

<div class="card" onclick="window.location.href='dev.html'">
<img src="download.jpg">
<h2>Pembuat Website</h2>
<p>Developer website</p>
</div>

<div class="card" onclick="goto('https://whatsapp.com/channel/0029VbBxTWc6LwHemkh5tt11')">
<h2>Saluran ALYA MD</h2>
<p>Ikuti update bot</p>
</div>

<div class="card" onclick="goto('https://wa.me/6285810537050?text=min+mau+sewabot')">
<h2>Owner</h2>
<p>Sewa bot WhatsApp</p>
</div>

<div class="card" onclick="goto('https://tiktok.com/@razzziy')">
<h2>Tiktok Owner</h2>
<p>Follow TikTok</p>
</div>

<div class="card" onclick="window.location.href='unban.html'">
<h2>Unban WA</h2>
<p>Proses cepat</p>
</div>

</div>

</div>

<script>

let approved=false

function toggleCheck(){
approved=!approved
const box=document.getElementById("check")
const btn=document.getElementById("enterBtn")

if(approved){
box.classList.add("active")
btn.innerText="MASUK KE WEBSITE"
}else{
box.classList.remove("active")
btn.innerText="TUNGGU PERSETUJUAN"
}
}

function enterPortal(){
if(!approved)return

document.getElementById("protocol-screen").style.display="none"
document.getElementById("loader").style.display="flex"

const video = document.getElementById("introVideo")

video.onended = () => {
document.getElementById("loader").style.display="none"
document.getElementById("main").style.display="block"
document.body.style.overflow="auto"
}

}

function updateClock(){
const now=new Date()
let h=String(now.getHours()).padStart(2,"0")
let m=String(now.getMinutes()).padStart(2,"0")
let s=String(now.getSeconds()).padStart(2,"0")
document.getElementById("clock").innerText=`${h}:${m}:${s}`
}

setInterval(updateClock,1000)

function goto(url){
window.location.href=url
}

</script>

</body>
</html>
